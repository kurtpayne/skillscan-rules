name: Validate Rules

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate rule schema
        run: |
          python3 -c "
          import yaml, sys, re
          data = yaml.safe_load(open('rules/default.yaml'))
          errors = []
          seen_ids = set()
          required = {'id', 'category', 'severity'}
          for section in ('static_rules', 'chain_rules'):
              for i, rule in enumerate(data.get(section, [])):
                  rid = rule.get('id', f'MISSING-{i}')
                  # Check required fields
                  missing = required - set(rule.keys())
                  if missing:
                      errors.append(f'{rid}: missing fields {missing}')
                  # Check duplicate IDs
                  if rid in seen_ids:
                      errors.append(f'{rid}: duplicate rule ID')
                  seen_ids.add(rid)
                  # Check regex compiles (skip graph rules with sentinel pattern)
                  pattern = rule.get('pattern', '')
                  if pattern and pattern != '(?!x)x':
                      try:
                          re.compile(pattern)
                      except re.error as e:
                          errors.append(f'{rid}: invalid regex: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print(f'Validated {len(seen_ids)} rules. No errors.')
          "

      - name: Validate manifest hashes
        run: |
          python3 -c "
          import hashlib, json
          manifest = json.load(open('manifest.json'))
          errors = []
          for path, meta in manifest['files'].items():
              actual = hashlib.sha256(open(path, 'rb').read()).hexdigest()
              if actual != meta['sha256']:
                  errors.append(f'{path}: expected {meta[\"sha256\"][:16]}... got {actual[:16]}...')
          if errors:
              print('Manifest hash mismatches:')
              for e in errors:
                  print(f'  {e}')
              exit(1)
          print(f'All {len(manifest[\"files\"])} file hashes verified.')
          "

      - name: Validate JSON schemas
        run: |
          python3 -c "
          import json
          for f in ['intel/ioc_db.json', 'intel/vuln_db.json', 'intel/managed_sources.json']:
              data = json.load(open(f))
              print(f'{f}: valid JSON ({type(data).__name__})')
          "
