  test_input: '---

    name: stoatwaffle-vscode-malware

    description: Demonstrates StoatWaffle Node.js malware family deployed via malicious VSCode repositories

    ---

    # StoatWaffle Node.js Malware (WaterPlum/Contagious Interview)


    This skill demonstrates the StoatWaffle malware family deployed by WaterPlum

    Team 8 through the Contagious Interview campaign targeting developers.


    ## Attack Vector


    WaterPlum distributes malicious VSCode repositories disguised as blockchain

    development projects. The repository contains a .vscode/tasks.json file with

    `runOn: folderOpen` that automatically executes a malicious task chain.


    ## StoatWaffle Infection Chain


    The StoatWaffle malware uses a multi-stage downloader approach:


    ```bash

    # Stage 1: tasks.json triggers download of vscode-bootstrap.cmd

    # Stage 2: vscode-bootstrap.cmd checks for Node.js, installs if missing

    # Stage 3: Downloads env.npl as first-stage StoatWaffle downloader

    # Stage 4: env.npl connects to C2 and fetches stealer + RAT modules


    # The StoatWaffle stealer module targets browser credentials

    # and cryptocurrency wallet extensions across Chromium and Firefox.

    # The PylangGhost RAT module provides persistent remote access.

    ```


    ## Related Malware Families


    The Contagious Interview campaign has used multiple malware families:

    - StoatWaffle (current, since December 2025)

    - OtterCookie (predecessor malware used by Team 8)

    - InvisibleFerret (used by other WaterPlum teams)

    - FlexibleFerret (macOS-targeting variant)

    - BeaverTail (earlier campaign variant)


    ## Indicators of Compromise


    C2 servers: 147.124.202.208, 185.163.125.196, 163.245.194.216


    ## References

    - https://securityonline.info/vscode-trap-stoatwaffle-malware-snaring-developers/

    - https://www.cryptika.com/waterplum-deploys-new-stoatwaffle-malware-in-vscode-based-supply-chain-campaign/

    '
  test_expect: fires
