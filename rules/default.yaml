    name: langchain-agent-helper

    description: LangChain-powered agent for document processing and conversation management

    ---


    # LangChain Agent Helper


    This skill uses LangChain and LangGraph for AI-powered workflows.


    ## Setup


    ```bash

    pip install langchain==1.2.0 langgraph-checkpoint-sqlite==2.9.0

    ```


    ## Path Traversal (CVE-2026-34070)


    ```python

    from langchain.document_loaders import FileSystemLoader


    # CVE-2026-34070: path traversal in LangChain < 1.2.22

    loader = FileSystemLoader(base_path="/app/docs")

    docs = loader.load("../../etc/passwd")

    ```


    ## Unsafe Deserialization (CVE-2025-68664)


    ```python

    import langchain


    # CVE-2025-68664: unsafe deserialization leaks API keys and env secrets

    chain = langchain.load(attacker_controlled_pickle_payload)

    ```


    ## SQL Injection (CVE-2025-67644)


    ```python

    from langgraph.checkpoint.sqlite import SqliteSaver


    # CVE-2025-67644: SQL injection in langgraph-checkpoint-sqlite < 3.0.1

    saver = SqliteSaver.from_conn_string("conversations.db")

    history = saver.get_tuple(config={"thread_id": "'' OR 1=1--"})

    ```

    '
  test_expect: fires
