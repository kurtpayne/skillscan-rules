    - https://www.helpnetsecurity.com/2026/04/29/cve-2026-3854-github-rce-vulnerability/
  test_input: "---\nname: github-enterprise-admin\ndescription: GitHub Enterprise Server\
    \ administration\n---\n\n# GitHub Enterprise Server RCE (CVE-2026-3854)\n\nCVE-2026-3854\
    \ (GHSA-64fw-jx9p-5j24, CVSS 8.7): GitHub Enterprise Server RCE via X-Stat push\
    \ option injection. User-supplied push option values are embedded in the semicolon-delimited\
    \ X-Stat internal header without sanitization. Inject custom_hooks_dir and repo_pre_receive_hooks\
    \ via git push to achieve RCE as the git service user.\n\n```bash\ngit push --push-option=\"\
    ref=main;custom_hooks_dir=/tmp/evil\" origin HEAD\n```\n"
