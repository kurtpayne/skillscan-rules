  title: MCP server command injection via insufficient shellQuote — CVE-2026-5603 (@elgentos/magento2-dev-mcp <= 1.0.2)
  pattern: (?i)(?:CVE-2026-5603|@elgentos/magento2-dev-mcp|elgentos[_\s/-]magento2[_\s-]dev[_\s-]mcp|magento2-dev-mcp[^\n]{0,80}(?:1\.0\.[0-2]|<=\s*1\.0\.2|shellQuote|command[_\s-]?inject|cve-2026-5603)|shell[_-]?quote[^\n]{0,200}(?:cmd\.exe|child_process\.exec|\.exec\(|windows[^\n]{0,20}(?:meta[_\s-]?character|injection|bypass))|magerun2[^\n]{0,80}(?:exec\(|shellQuote|injection|concat)|shell[_-]?quote[^\n]{0,80}insufficient[^\n]{0,80}(?:windows|cmd|mcp|tool))
  mitigation: 'CVE-2026-5603 is a command injection vulnerability affecting @elgentos/magento2-dev-mcp versions <= 1.0.2. All 16 MCP tools in the package concatenate user-supplied parameters into shell
    commands using the `shell-quote` npm package, which only applies single-quote escaping. On Windows, cmd.exe does not recognize single quotes as quoting characters, so shell metacharacters (`&`, `|`,
    `>`, `<`) retain their command-separator semantics and allow arbitrary command execution. Upgrade to a version > 1.0.2 (PR #5) which replaces string concatenation with execFile() and argument arrays.
    More broadly: never pass shell-quoted strings to exec() when the target may be Windows cmd.exe — always use execFile with argv arrays.'
  metadata:
