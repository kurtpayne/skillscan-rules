    # CVE-2026-41264 — Flowise CSV Agent Prompt Injection RCE


    This advisory documents CVE-2026-41264 (GHSA-3hjv-c53m-58jj), an

    unauthenticated prompt-injection-to-RCE vulnerability in flowise-components

    versions < 3.1.0. The CSV Agent node''s `run` method in `CSV_Agents`

    translates a user prompt into pandas operations, then executes the

    generated Python in Pyodide.


    ## Vulnerable Pattern


    Input validation uses a regex like `\bimport\s+(?!pandas|numpy\b)` to

    restrict imports to pandas/numpy. An attacker bypasses the allowlist

    through module aliasing:


    ```python

    import pandas as np, os as pandas

    pandas.system("id > /tmp/pwned")

    ```


    Because the import statement matches `import pandas` textually, the

    filter passes. But the local name `pandas` is now bound to the `os`

    module, giving the chatflow arbitrary OS command execution.


    ## Dependency


    ```json

    { "dependencies": { "flowise-components": "3.0.5" } }

    ```


    ## Fix


    Upgrade `flowise-components` to 3.1.0 or later.


    ## References


    - https://advisories.gitlab.com/npm/flowise-components/CVE-2026-41264/

    - https://github.com/advisories/GHSA-3hjv-c53m-58jj

    '
