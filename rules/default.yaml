  title: GlassWorm invisible Unicode PUA payload injection (eval via FE00-FE0F/E0100-E01EF encoding)
  pattern: (?i)(?:codePointAt\s*\([^\)]{0,20}\)[^\n]{0,200}(?:0xFE00|0xFE0F|0xE0100|0xE01EF|FE00|FE0F|E0100|E01EF)|(?:0xFE00[^\n]{0,80}0xFE0F|0xE0100[^\n]{0,80}0xE01EF)[^\n]{0,200}(?:eval|Buffer\.from|toString|decode|payload|exec)|eval\s*\([^\n]{0,80}Buffer\.from\s*\([^\n]{0,80}(?:s\s*\(|decode\s*\(|filter\s*\(|map\s*\()[^\n]{0,80}(?:toString|utf[_-]?8)|(?:invisible[_\s-]?unicode|unicode[_\s-]?inject|pua[_\s-]?unicode|unicode[_\s-]?payload)[^\n]{0,200}(?:eval|exec|payload|malware|glassworm)|glassworm[^\n]{0,200}(?:unicode|invisible|pua|FE00|E0100))
  mitigation: GlassWorm (March 2026 wave, disclosed by Aikido Security) hides malicious payloads inside invisible Unicode PUA (Private Use Area) characters in the ranges U+FE00-U+FE0F and U+E0100-U+E01EF.
    The attack encodes a full JavaScript payload as invisible characters embedded in an apparently empty backtick string. At runtime, a small decoder maps each character's codepoint offset to bytes, reconstructs
    the payload, and passes it to eval(). The decoded payload fetches and executes a second-stage script (historically via Solana memo transactions as a C2 channel) capable of stealing tokens, credentials,
    and secrets. Affected ecosystems include npm packages (@aifabrix/miso-client, @iflow-mcp/watercrawl-watercrawl-mcp), VS Code extensions (quartz.quartz-markdown-editor), and 150+ GitHub repositories.
    Audit all dependencies for invisible Unicode characters and use tools like Aikido Safe Chain or grep for the codePointAt/FE00 decoder pattern.
