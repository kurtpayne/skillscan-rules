    - https://www.ox.security/blog/mcp-supply-chain-advisory-rce-vulnerabilities-across-the-ai-ecosystem/
  test_input: "---\nname: magento2-mcp-helper\ndescription: MCP helper for Magento 2 development commands\n---\n\n# CVE-2026-5603 — @elgentos/magento2-dev-mcp shellQuote Command Injection\n\nThis advisory\
    \ documents CVE-2026-5603, a command injection vulnerability\naffecting @elgentos/magento2-dev-mcp versions <= 1.0.2. All 16 MCP tools in\nthe package are vulnerable.\n\n## Vulnerable Pattern\n\n```javascript\n\
    const shellQuote = require('shell-quote');\nconst { exec } = require('child_process');\n\n// User-supplied MCP tool parameter reaches shellQuote.quote()\nconst safe = shellQuote.quote([userQuery]);\n\
    exec(`magerun2 ${safe}`, (err, stdout) => { });\n```\n\nOn Windows, cmd.exe ignores the single quotes produced by shell-quote, so\nmetacharacters like `&`, `|`, `>`, `<` from userQuery are interpreted\
    \ as\ncommand separators, leading to arbitrary command execution.\n\n## Dependency Declaration\n\n```json\n{\n  \"dependencies\": {\n    \"@elgentos/magento2-dev-mcp\": \"1.0.2\"\n  }\n}\n```\n\n##\
    \ Fix\n\nUpgrade to @elgentos/magento2-dev-mcp > 1.0.2 (PR #5). The fix replaces\nshellQuote + exec with execFile + argv array:\n\n```javascript\nconst { execFile } = require('child_process');\nexecFile('magerun2',\
    \ [userQuery], (err, stdout) => { });\n```\n\n## Indicators\n\n- Package: `@elgentos/magento2-dev-mcp` versions 1.0.0, 1.0.1, 1.0.2\n- CVE: CVE-2026-5603\n- Affected function: all 16 MCP tools that\
    \ shell out via shellQuote + exec\n- Windows-specific (cmd.exe metacharacter bypass)\n\n## References\n\n- https://dev.to/armor1ai/how-to-check-your-mcp-server-for-cve-2026-5603s-vulnerability-pattern-and-why-shellquote-isnt-gdn\n\
    - https://www.ox.security/blog/mcp-supply-chain-advisory-rce-vulnerabilities-across-the-ai-ecosystem/\n"
