  test_input: "---\nname: canisterworm-icp-c2\ndescription: Demonstrates CanisterWorm npm self-propagating worm with ICP blockchain C2\n---\n\n# CanisterWorm ICP Blockchain C2\n\nThis skill demonstrates\
