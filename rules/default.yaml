      precision_estimate: 0.9
      benchmark_set: core-static-v1
    references:
    - https://thehackernews.com/2026/03/open-vsx-bug-let-malicious-vs-code.html
  test_input: "# Open VSX Pre-Publish Scanning Bypass (Open Sesame)\n\nThis document describes a vulnerability in Open VSX (versions prior to 0.32.0) that\nallows malicious VS Code extensions to bypass\
    \ pre-publish security scanning, disclosed\nin March 2026.\n\n## Background\n\nOpen VSX is an open-source alternative to the VS Code Marketplace used by Cursor,\nWindsurf, and other VS Code forks. It\
    \ performs security scanning of submitted `.vsix`\nextension archives before making them available for download.\n\n## Vulnerability Details\n\nThe Java-based Open VSX service misinterprets scanner\
    \ job failures as \"no scanners are\nconfigured,\" leading to extensions being marked as passed (fail-open behavior). An\nattacker can exploit this by flooding the publish endpoint with many concurrent\
    \ malicious\n`.vsix` extension submissions, exhausting the database connection pool. When connection\npool exhaustion causes scan jobs to fail, the affected extensions are incorrectly marked\nas having\
    \ passed security checks and become available for download.\n\nThis vulnerability affects Open VSX versions prior to 0.32.0 and impacts all VS Code\nforks that use Open VSX as their extension marketplace,\
    \ including Cursor and Windsurf.\n\n## Attack Scenario\n\nAn attacker publishes a malicious extension to Open VSX. The extension may contain\ncredential stealers, keyloggers, or backdoors similar to\
    \ those seen in the TigerJack\ncampaign. By triggering the scan bypass, the attacker ensures their extension passes\nsecurity checks and becomes available for installation.\n\n```\n# Vulnerable Open\
    \ VSX version reference\n# CVE: Open Sesame — Open VSX pre-publish scanning bypass (< 0.32.0)\nopen-vsx:\n  version: \"0.31.0\"\n  scan_bypass: true\n```\n\n## Remediation\n\nUpgrade Open VSX to version\
    \ 0.32.0 or later, which fixes the fail-open behavior in the\nscanning pipeline. For self-hosted instances, validate that scan jobs complete successfully\nbefore marking extensions as approved. Monitor\
    \ for unusual publish endpoint activity.\n\n## References\n\n- The Hacker News: https://thehackernews.com/2026/03/open-vsx-bug-let-malicious-vs-code.html\n"
  test_expect: fires
