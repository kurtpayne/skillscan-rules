  mitigation: 'CVE-2026-39987 (CVSS 9.3, CWE-306, GHSA-2679-6mx9-h9xc) is a critical pre-authentication remote code execution vulnerability in Marimo, a popular Python reactive notebook framework (~19.6k
    GitHub stars). The /terminal/ws WebSocket endpoint lacks authentication validation: while other endpoints correctly call validate_auth(), /terminal/ws only checks running mode and platform support,
    allowing any unauthenticated attacker to obtain a full PTY shell and execute arbitrary system commands. The vulnerability was exploited in the wild within 10 hours of disclosure. Upgrade Marimo to version
