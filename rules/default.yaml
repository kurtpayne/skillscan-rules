  pattern: (?i)(?:cursor[_-]?tunnel[^\n]{0,200}(?:spawn|fs_write|fs_read|fs_rm|rpc)|(?:export\s+\w+[^\n]{0,80}&&[^\n]{0,80}cd[^\n]{0,80}&&[^\n]{0,80}(?:\.zshenv|\.bashrc|\.zshrc|\.bash_profile|\.zprofile))|(?:\.zshenv|\.bashrc|\.zshrc).{0,200}(?:cursor[_-]?tunnel|/tmp/run\.sh|payload|stager)|cursor[_-]?tunnel[^\n]{0,200}(?:device[_-]?code|oauth|github\.com/login/device))
  mitigation: NomShub (disclosed April 3, 2026) is a critical vulnerability chain in Cursor AI code editor. A malicious repository embeds indirect prompt injection to trick Cursor's AI agent into running
    shell builtin chains (export/cd/source/eval) that escape the workspace sandbox, overwrite ~/.zshenv for persistence, and activate cursor-tunnel for persistent remote shell access. The cursor-tunnel
    binary provides full shell access via spawn/fs_write RPC methods and can be hijacked via GitHub device code OAuth flow. Fixed in Cursor 3.0. Do not open untrusted repositories in Cursor with agent mode
    enabled. Audit ~/.zshenv for unexpected entries.
