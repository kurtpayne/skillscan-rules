  test_input: "# Apache SkyWalking MCP SSRF via SW-URL Header (CVE-2026-34476)\n\nThis document describes CVE-2026-34476, a Server-Side Request Forgery (SSRF) vulnerability\nin Apache SkyWalking MCP version\
    \ 0.1.0, disclosed April 13, 2026.\n\n## Background\n\nApache SkyWalking MCP is an MCP server that exposes SkyWalking observability data\n(traces, logs, metrics, topology, alarms, events) through MCP\
    \ tools. Version 0.1.0\ncontains an SSRF vulnerability that allows attackers to forge requests to internal\nresources by manipulating the SW-URL header.\n\n## Vulnerability Details\n\nCVE-2026-34476\
    \ affects Apache SkyWalking MCP version 0.1.0. The MCP server fails to\nvalidate or sanitize the SW-URL header value before using it to construct backend requests.\nAn attacker with network access can\
    \ supply a crafted SW-URL header pointing to internal\nservices, cloud metadata endpoints (e.g., `http://169.254.169.254/`), or other restricted\nresources.\n\nA companion vulnerability, CVE-2026-34884,\
    \ also affects version 0.1.0 and covers SSRF\nvia the `set_skywalking_url` MCP tool as well as GraphQL expression injection in the\nMCP server.\n\n## Affected Configuration\n\n```yaml\n# Example vulnerable\
    \ configuration referencing Apache SkyWalking MCP 0.1.0\n# CVE-2026-34476: SSRF via SW-URL header in apache/skywalking-mcp\nmcp_server:\n  type: skywalking-mcp\n  version: \"0.1.0\"\n  endpoint: \"\
    http://skywalking-oap:12800\"\n```\n\n## Remediation\n\nUpgrade to Apache SkyWalking MCP version 0.2.0 or later, which adds validation for\ntool configuration properties and fixes the SW-URL header\
