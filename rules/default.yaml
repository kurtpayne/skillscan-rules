    pandas operations, then executes them via Pyodide. The input validation (a regex that blocks `\bimport\s+(?!pandas|numpy\b)`) can be bypassed by import aliasing — `import os as pandas; pandas.system("...")`
    passes the allowlist because the module name after `import` is `os` (blocked) but `pd`, `np`, or `pandas` as an alias smuggles the forbidden module in. An unauthenticated attacker sending crafted prompts
