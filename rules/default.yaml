    # CVE-2026-20205 — Splunk MCP Server Token Log Disclosure


    This advisory documents CVE-2026-20205, an information disclosure

    vulnerability in the Splunk MCP Server app < 1.0.3. Session and

    authorization tokens are written to logs in cleartext, so any user

    with access to the `_internal` index (or local filesystem read access

    to the Splunk server logs, or the `mcp_tool_admin` capability) can

    harvest active session tokens and hijack sessions.


    ## Dependency


    - App name: Splunk MCP Server

    - Affected versions: < 1.0.3

    - Fixed: 1.0.3


