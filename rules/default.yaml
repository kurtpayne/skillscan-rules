- id: PSV-057
  category: passive_surveillance
  severity: high
  confidence: 0.9
  title: GitHub Enterprise Server RCE via X-Stat push option injection (CVE-2026-3854,
    GHSA-64fw-jx9p-5j24, GHES < 3.14.25/3.15.20/3.16.16/3.17.13/3.18.8/3.19.4)
  pattern: (?i)(?:CVE-2026-3854|GHSA-64fw-jx9p-5j24|(?:X-Stat[^\n]{0,80}(?:push[_\s-]?option|semicolon|inject)|push[_\s-]?option[^\n]{0,120}(?:X-Stat|semicolon[_\s-]?inject|custom_hooks_dir|repo_pre_receive_hooks))|(?:custom_hooks_dir|repo_pre_receive_hooks)[^\n]{0,80}(?:inject|push[_\s-]?option|github[_\s-]?enterprise|git[_\s-]?push|rce))
  mitigation: CVE-2026-3854 (CVSS 8.7, CWE-77, GHSA-64fw-jx9p-5j24) is a remote code
    execution vulnerability in GitHub Enterprise Server (GHES). During git push, user-supplied
    push option values are embedded in the internal X-Stat semicolon-delimited header without
    stripping semicolons. An authenticated attacker with push access can inject three X-Stat
    fields -- rails_env (sandbox bypass), custom_hooks_dir (hook directory redirect), and
    repo_pre_receive_hooks (hook entry with path traversal) -- to achieve RCE as the git
    service user via a single crafted git push command. Fixed in GHES 3.14.25, 3.15.20,
    3.16.16, 3.17.13, 3.18.8, 3.19.4, 3.20.0. GitHub.com was patched same-day on March
    4, 2026 (no exploitation confirmed). Upgrade self-hosted GHES immediately; 88% of
    instances remain unpatched as of public disclosure (April 28, 2026).
