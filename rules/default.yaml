  - id: EXF-005
    category: exfiltration
    severity: high
    confidence: 0.91
    title: GitHub Actions untrusted PR head checkout reference
    pattern: ref:\s*\$\{\{\s*github\.event\.pull_request\.head\.(?:sha|ref)\s*\}\}|repository:\s*\$\{\{\s*github\.event\.pull_request\.head\.repo\.full_name\s*\}\}
    mitigation: Avoid checking out `github.event.pull_request.head.*` in privileged
      workflows. Use `pull_request` for untrusted code, or gate privileged jobs and
      use immutable trusted refs.
    metadata:
      version: 1.0.0
      status: active
      techniques:
