  title: OpenVSX Code Extension Marketplace Zip Slip vulnerability (CVE-2026-35454, pre-2.4.2)
  pattern: (?i)(?:CVE-2026-35454|open[_\s-]?vsx[^\n]{0,200}(?:zip[_\s-]?slip|path[_\s-]?travers|arbitrary[_\s-]?file[_\s-]?write|security[_\s-]?bypass|pre[_-]?2\.4\.2|before[_\s-]?2\.4\.2)|code[_\s-]?extension[_\s-]?marketplace[^\n]{0,200}(?:zip[_\s-]?slip|path[_\s-]?travers|arbitrary[_\s-]?file|CVE-2026-35454)|(?:openvsx|open[_\s-]?vsx)[^\n]{0,80}(?:2\.[0-3]\.[0-9]|2\.4\.[01])[^\n]{0,80}(?:vuln|cve|exploit|bypass|malicious))
  mitigation: CVE-2026-35454 is a Zip Slip path traversal vulnerability in the Open VSX Code Extension Marketplace (versions prior to 2.4.2). During extension installation, maliciously crafted .vsix archives
    can use relative path components (e.g., ../../) to write files outside the intended extraction directory, bypassing pre-publication security checks and enabling arbitrary file write on the marketplace
    server or client. Upgrade the Open VSX marketplace to version 2.4.2 or later. For self-hosted instances, validate all archive entry paths against the target extraction directory before extraction. For
    extension consumers, prefer the official VS Code Marketplace or verify extension integrity via publisher signatures.
