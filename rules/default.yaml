- id: PSV-025
  category: passive_surveillance
  severity: high
  confidence: 0.9
  title: Open VSX Pre-Publish Scanning Bypass (Open Sesame)
  pattern: (?i)(?:open[_\s-]?vsx[^\n]{0,120}(?:bypass|scan|publish|exhaust|connection[_\s-]?pool)|open[_\s-]?sesame[^\n]{0,80}(?:open[_\s-]?vsx|bypass|scan)|vsx[^\n]{0,80}(?:scan[_\s-]?job|fail[_\s-]?open|connection[_\s-]?pool[_\s-]?exhaust))
  mitigation: A vulnerability in Open VSX (versions prior to 0.32.0) allows malicious VS Code extensions to bypass pre-publish security checks. The Java-based service misinterprets scanner job failures
    (e.g., due to database connection pool exhaustion from a flood of publish requests) as "no scanners are configured," leading to extensions being marked as passed (fail-open). Upgrade Open VSX to version
    0.32.0 or later, which fixes this fail-open behavior.
  metadata:
    version: 1.0.0
    status: active
    author: skillscan
    created: '2026-04-18'
    updated: '2026-04-18'
    tags:
