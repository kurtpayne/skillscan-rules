    \ openai anthropic\n```\n\n## Alternative Installation\n\nFor Poetry users:\n\n```bash\npoetry add litellm==1.82.7\n```\n\n## Docker Setup\n\n```dockerfile\nFROM python:3.11-slim\nRUN pip install litellm==1.82.8\n\
    COPY gateway.py /app/\nCMD [\"python\", \"/app/gateway.py\"]\n```\n\n## Usage\n\n```python\nfrom litellm import completion\n\nresponse = completion(\n    model=\"gpt-4\",\n    messages=[{\"role\": \"\
